<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }} - VendorHub</title>
</head>
<body>

    <!-- PRODUCT TITLE -->
    <h1>{{ product.name }}</h1>

    <!-- PRODUCT IMAGE -->
    {% if product.image %}
        <img src="{{ product.image.url }}" width="300">
    {% endif %}

    <!-- PRODUCT INFO -->
    <p><b>Price:</b> ₹{{ product.price }}</p>
    <p><b>Description:</b> {{ product.description }}</p>

    <p><b>Stock:</b> {{ product.stock }}</p>

    <!-- CATEGORY -->
    {% if product.category %}
        <p><b>Category:</b> {{ product.category.name }}</p>
    {% endif %}

    <!-- VENDOR INFO -->
    <p><b>Seller:</b> {{ product.vendor.store_name }}</p>

    <hr>

    <!-- ADD TO CART BUTTON -->
    <a href="{% url 'add_to_cart' product.id %}">
        <button style="padding:10px 20px; background:green; color:white;">
            Add to Cart
        </button>
    </a>

    <!-- BACK TO PRODUCTS -->
    <br><br>
    <a href="{% url 'product_list' %}">← Back to Products</a>

</body>
</html>
