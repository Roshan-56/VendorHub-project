<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>
</head>
<body>
    <h1>{{ product.name }}</h1>

    {% if product.image %}
        <img src="{{ product.image.url }}" width="300">
    {% endif %}

    <p>Price: ₹{{ product.price }}</p>

    <p>
        {% if product.description %}
            {{ product.description }}
        {% else %}
            Fresh quality product.
        {% endif %}
    </p>

    <a href="/cart/add/{{ product.id }}/">Add to Cart</a>
    <br><br>
    <a href="/products/">Back to Products</a>
</body>
</html>
