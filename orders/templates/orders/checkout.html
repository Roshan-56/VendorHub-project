<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
</head>
<body>

<h1>Checkout</h1>

<h3>Total: ₹{{ cart.get_total }}</h3>

<form method="POST" action="{% url 'place_order' %}">
    {% csrf_token %}

    <label>Shipping Address:</label><br>
    <textarea name="address" required></textarea><br><br>

    <button type="submit">Place Order</button>
</form>

</body>
</html>
