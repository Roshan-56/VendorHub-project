<!DOCTYPE html>
<html>
<head>
    <title>Vendor Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        h1 {
            color: #1e293b;
            margin-bottom: 10px;
        }

        p {
            color: #64748b;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
        }

        .card h2 {
            margin: 0;
            font-size: 32px;
            color: #f97316;
        }

        .card span {
            display: block;
            margin-top: 8px;
            color: #64748b;
        }

        .actions {
            margin-top: 40px;
        }

        .btn {
            display: inline-block;
            padding: 12px 22px;
            margin-right: 10px;
            background: #f97316;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }

        .btn.secondary {
            background: #0f172a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vendor Dashboard</h1>
        <p>Welcome, {{ request.user.username }}!</p>

        <div class="grid">
            <div class="card">
                <h2>₹0</h2>
                <span>Total Sales</span>
            </div>

            <div class="card">
                <h2>0</h2>
                <span>Total Orders</span>
            </div>

            <div class="card">
                <h2>0</h2>
                <span>Products Listed</span>
            </div>

            <div class="card">
                <h2>₹0</h2>
                <span>Pending Payout</span>
            </div>
        </div>

        <div class="actions">
            <a href="/" class="btn">Home</a>
            <a href="/products/" class="btn secondary">Products</a>
        </div>
    </div>
</body>
</html>
